<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>자기소개서</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #e9e9e9;
      color: #111;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif;
      font-size: 12px;
      line-height: 1.35;
    }

    .page {
      width: 210mm;
      min-height: 297mm;
      margin: 18px auto;
      padding: 18mm 16mm 16mm;
      background: #fff;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.16);
    }

    h1 {
      margin: 0 0 18px;
      text-align: center;
      font-size: 21px;
      font-weight: 700;
      letter-spacing: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th, td {
      border: 1px solid #111;
      padding: 5px 10px;
      word-break: keep-all;
      overflow-wrap: anywhere;
      font-weight: 400;
    }

    th {
      height: 34px;
      text-align: left;
      font-weight: 700;
    }

    td {
      height: 190px;
      vertical-align: top;
    }

    .confirm {
      margin-top: 28px;
      text-align: center;
      font-size: 13px;
    }

    .date {
      margin-top: 20px;
      text-align: center;
      font-size: 13px;
    }

    .sign {
      margin-top: 16px;
      padding-right: 54px;
      text-align: right;
      font-size: 13px;
    }

    @page { size: A4; margin: 0; }

    @media print {
      body { background: #fff; }
      .page { width: 210mm; min-height: 297mm; margin: 0; box-shadow: none; }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>자 기 소 개 서</h1>

    <table>
      <tr>
        <th>1. 지원동기 및 입사 후 계획</th>
      </tr>
      <tr>
        <td>.</td>
      </tr>
      <tr>
        <th>2 본인의 강점과 약점</th>
      </tr>
      <tr>
        <td></td>
      </tr>
      <tr>
        <th>3. 위기 극복 경험</th>
      </tr>
      <tr>
        <td></td>
      </tr>
    </table>

    <p class="confirm">위의 모든 내용은 사실과 다름없음을 확인합니다.</p>
    <p class="date">2026년 00월 00일</p>
    <p class="sign">지원자&nbsp;&nbsp;&nbsp;&nbsp;홍 길 동 (인)</p>
  </main>
</body>
</html>
